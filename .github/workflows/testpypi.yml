name: Publish to TestPyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.package-version.outputs.value }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
      - name: Read package version
        id: package-version
        run: echo "value=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')" >> "$GITHUB_OUTPUT"
      - name: Build and validate distributions
        run: |
          uv build --clear --no-sources
          uvx twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: testpypi-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/project/cohere-transcribe-arabic/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: testpypi-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify:
    name: Verify published wheel
    runs-on: ubuntu-latest
    needs: [build, publish]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Download wheel from TestPyPI
        env:
          PACKAGE_VERSION: ${{ needs.build.outputs.package-version }}
        run: |
          mkdir -p /tmp/cohere-testpypi
          for attempt in 1 2 3 4 5; do
            if python -m pip download --no-deps \
              --index-url https://test.pypi.org/simple/ \
              "cohere-transcribe-arabic==$PACKAGE_VERSION" \
              --dest /tmp/cohere-testpypi; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then exit 1; fi
            sleep 15
          done
      - name: Verify package metadata and public import
        env:
          PACKAGE_VERSION: ${{ needs.build.outputs.package-version }}
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --no-deps /tmp/cohere-testpypi/*.whl
          python - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          import cohere_transcribe

          expected = os.environ["PACKAGE_VERSION"]
          assert version("cohere-transcribe-arabic") == expected
          assert cohere_transcribe.__version__ == expected
          assert files("cohere_transcribe").joinpath("py.typed").is_file()
          PY

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true
      - name: Install development environment
        run: |
          uv venv --python 3.12
          uv pip install --editable . --group dev --torch-backend=cpu
      - name: Check lockfile
        run: uv lock --check
      - name: Check formatting
        run: uv run --no-sync ruff format --check .
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Check public API typing
        run: uv run --no-sync mypy --strict scripts/typecheck_public_api.py

  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Validate locked environment
        run: uv sync --locked --all-extras --group dev --python "${{ matrix.python-version }}" --dry-run
      - name: Install test environment
        run: |
          uv venv --python "${{ matrix.python-version }}"
          uv pip install --editable '.[auditok,onnx,word]' --group dev --torch-backend=cpu
      - name: Run tests
        run: uv run --no-sync pytest
